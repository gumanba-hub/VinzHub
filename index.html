<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VinzHub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #1f1c2c, #928dab);
}

.container {
    width: 500px;
    padding: 40px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(15px);
    box-shadow: 0 0 40px rgba(0,0,0,0.4);
    text-align: center;
    animation: fadeIn 1s ease-in-out;
}

h1 {
    font-size: 2.2rem;
    margin-bottom: 25px;
    color: #ffffff;
}

textarea {
    width: 100%;
    height: 120px;
    border-radius: 12px;
    border: none;
    padding: 15px;
    font-size: 0.9rem;
    resize: none;
    background: rgba(0, 0, 0, 0.4);
    color: #fff;
    outline: none;
}

button {
    margin-top: 20px;
    padding: 12px 25px;
    border-radius: 30px;
    border: none;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    color: white;
    background: linear-gradient(45deg, #00c6ff, #0072ff);
    transition: 0.3s ease;
    box-shadow: 0 0 15px rgba(0, 114, 255, 0.6);
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px rgba(0, 114, 255, 1);
}

.counter {
    margin-top: 15px;
    font-size: 0.9rem;
    color: #ddd;
}

.copied {
    margin-top: 10px;
    font-size: 0.85rem;
    color: #00ffae;
    opacity: 0;
    transition: opacity 0.3s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="container">
    <h1>VinzHub</h1>

    <textarea id="scriptArea" readonly>
loadstring(game:HttpGet("https://raw.githubusercontent.com/gumanba-hub/Vinz-Hub/refs/heads/main/EscapeTsunamiForBrainrot"))()
    </textarea>

    <button onclick="copyScript()">Copy Script</button>

    <div class="counter" id="countText">Copied: 0 times</div>
    <div class="copied" id="copiedMsg">✔ Script Copied!</div>
</div>

<script>
let count = 0;

function copyScript() {
    const textarea = document.getElementById("scriptArea");
    navigator.clipboard.writeText(textarea.value);

    count++;
    document.getElementById("countText").innerText = `Copied: ${count} times`;

    const msg = document.getElementById("copiedMsg");
    msg.style.opacity = 1;
    setTimeout(() => {
        msg.style.opacity = 0;
    }, 1500);
}
</script>

</body>
</html>
