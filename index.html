<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VinzHub</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}

.container {
    width: 90%;
    max-width: 400px;
}

h1 {
    margin-bottom: 20px;
}

textarea {
    width: 100%;
    height: 100px;
    padding: 10px;
    border: none;
    border-radius: 5px;
    resize: none;
    margin-bottom: 15px;
    font-size: 14px;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 5px;
    background: #2563eb;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #1d4ed8;
}
</style>
</head>

<body>

<div class="container">
    <h1>VinzHub</h1>

    <textarea id="script" readonly>
loadstring(game:HttpGet("https://raw.githubusercontent.com/gumanba-hub/Vinz-Hub/refs/heads/main/EscapeTsunamiForBrainrot"))()
    </textarea>

    <button onclick="copyText()">Copy Script</button>
</div>

<script>
function copyText() {
    const text = document.getElementById("script").value;
    navigator.clipboard.writeText(text);
    alert("Script Copied!");
}
</script>

</body>
</html>
